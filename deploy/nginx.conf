# Nginx config for bookex.farya.pk
# Managed by Certbot for SSL — do not hand-edit the ssl_certificate lines.
# Place at: /etc/nginx/sites-available/bookex
# Enable: sudo ln -sf /etc/nginx/sites-available/bookex /etc/nginx/sites-enabled/bookex

upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream socketio_server {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream media_api {
    server 127.0.0.1:4010;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name bookex.farya.pk;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bookex.farya.pk;

    # SSL — Certbot fills these in during bootstrap
    ssl_certificate /etc/letsencrypt/live/bookex.farya.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookex.farya.pk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size (media API accepts up to 20 MB)
    client_max_body_size 20M;

    # Security headers (Next.js also sets some; Nginx adds the transport layer)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Socket.IO — must come before the catch-all location block.
    # Handles both long-polling (HTTP) and WebSocket upgrade paths.
    location /socket.io/ {
        proxy_pass http://socketio_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Keep WebSocket connections alive during inactivity
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Media API
    location /media/ {
        proxy_pass http://media_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # Next.js app (catch-all)
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }
}
