name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run TypeScript type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      # Build-time public vars — safe to expose in CI
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL || 'http://localhost:3001' }}

      # Required by next build and env-validation at startup.
      # These use placeholder values — the build is never run against a real DB.
      MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/bookex_ci' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-at-least-32-chars!!' }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
      MEDIA_API_SECRET: ${{ secrets.MEDIA_API_SECRET || 'ci-media-placeholder-secret' }}

      # Optional vars — empty values are fine for a build check
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
      REDIS_URL: ${{ secrets.REDIS_URL || '' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}

      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build Next.js app
        run: npm run build
